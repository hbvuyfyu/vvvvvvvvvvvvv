name: Build VCam APK

  on:
    push:
      branches: [ main, master ]
    pull_request:
      branches: [ main, master ]
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    build:
      name: Build Debug & Release APK
      runs-on: ubuntu-latest
      timeout-minutes: 30

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: gradle

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3
          with:
            log-accepted-android-sdk-licenses: true

        - name: Install NDK and CMake
          run: |
            echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
              "ndk;27.0.12077973" \
              "cmake;3.22.1" \
              "build-tools;35.0.0" \
              "platforms;android-35" \
              --sdk_root=$ANDROID_HOME

        - name: Cache Gradle packages
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
            restore-keys: |
              ${{ runner.os }}-gradle-

        - name: Grant execute permission for gradlew
          run: chmod +x gradlew

        - name: Build Debug APK
          run: ./gradlew assembleDebug --no-daemon --stacktrace
          env:
            ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

        - name: Build Release APK
          run: ./gradlew assembleRelease --no-daemon --stacktrace
          env:
            ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: VCam-Debug-APK
            path: app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30

        - name: Upload Release APK
          uses: actions/upload-artifact@v4
          with:
            name: VCam-Release-APK
            path: app/build/outputs/apk/release/app-release-unsigned.apk
            retention-days: 30

        - name: Create GitHub Release
          if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
          uses: softprops/action-gh-release@v2
          with:
            tag_name: v${{ github.run_number }}
            name: VCam v${{ github.run_number }}
            body: |
              ## VCam Build ${{ github.run_number }}
              
              ### Download
              - **Debug APK** (للتثبيت والاختبار): `app-debug.apk`
              - **Release APK** (غير موقع): `app-release-unsigned.apk`
              
              ### المتطلبات
              - Android 8.0+ (API 26+)
              - محاكي أندرويد مع روت (Genymotion، LDPlayer، MuMu، وغيرها)
              - مدير روت (Magisk)
              
              ### طريقة الاستخدام
              1. ثبّت APK على المحاكي المروّت
              2. امنح صلاحية Root عند الطلب
              3. اختر صورة أو فيديو للحقن
              4. اختر التطبيق المستهدف من القائمة
              5. اضغط **Start VCam**
              6. افتح كاميرا التطبيق المستهدف — ستظهر صورتك/فيديوك
            files: |
              app/build/outputs/apk/debug/app-debug.apk
              app/build/outputs/apk/release/app-release-unsigned.apk
            draft: false
            prerelease: false
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  